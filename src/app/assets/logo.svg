<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Checkbox background -->
  <rect x="10" y="10" width="80" height="80" rx="12" fill="#6366f1" stroke="#4f46e5" stroke-width="4"/>

  <!-- Sword blade -->
  <line x1="50" y1="25" x2="50" y2="60" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>

  <!-- Sword guard -->
  <line x1="40" y1="60" x2="60" y2="60" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>

  <!-- Sword handle -->
  <rect x="46" y="60" width="8" height="12" rx="2" fill="#d97706"/>

  <!-- Sword pommel -->
  <circle cx="50" cy="75" r="4" fill="#ea580c"/>
</svg>
